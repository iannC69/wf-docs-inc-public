name: Sync to private repo

on:
  push:
    branches: [main]
  pull_request_target:
    types: [closed]
    branches: [main]

jobs:
  sync:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: iannC69/wf-docs-inc-private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: Sync .md files
        run: |
          rsync -av --include="*/" --include="*.md" --exclude="*" \
            public/docs/ private/docs/

      - name: Commit and push to private repo
        run: |
          cd private
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "sync: update docs from public repo"
          git push